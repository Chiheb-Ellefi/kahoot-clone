name: quizblitz
description: A Kahoot-style quiz game built with Flutter.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2

  # State Management
  flutter_bloc: ^8.1.6

  # HTTP Client
  dio: ^5.4.3

  # Navigation
  go_router: ^14.2.0

  # Dependency Injection
  get_it: ^7.7.0

  # Local Storage
  shared_preferences: ^2.3.1

  # Supabase Storage
  supabase_flutter: ^2.5.6

  # Image Picker
  image_picker: ^1.1.2

  # Google Fonts
  google_fonts: ^6.2.1

  # Equatable
  equatable: ^2.0.5

  # Cached Network Image
  cached_network_image: ^3.3.1

  cupertino_icons: ^1.0.8
  file_picker: ^8.1.2
  web_socket_channel: ^3.0.3
  audioplayers: ^6.6.0
  flutter_svg: ^2.2.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - assets/sounds/
    - assets/icons/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/icons/quizzo.png
  min_sdk_android: 21
